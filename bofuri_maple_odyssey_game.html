<!DOCTYPE html>
<html> 
<head>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; overflow:hidden; font-family:monospace; }
canvas { display:block; }
#ui { position:absolute; top:0; left:0; width:100%; pointer-events:none; }
#hud { position:absolute; top:8px; left:8px; color:#fff; font-size:11px; }
#hud .bar-wrap { display:flex; align-items:center; gap:4px; margin:2px 0; }
#hud .bar { height:10px; border-radius:4px; border:1px solid rgba(255,255,255,0.3); }
#hud .hp-bar { background:#2d8a2d; width:150px; }
#hud .hp-fill { height:100%; background:#44ff44; border-radius:3px; transition:width 0.3s; }
#hud .mp-bar { background:#1a3a8a; width:100px; }
#hud .mp-fill { height:100%; background:#4488ff; border-radius:3px; }
#skill-bar { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:4px; }
.skill-btn { width:44px; height:44px; border:2px solid #ffaacc; background:rgba(0,0,0,0.7); color:#ffaacc; font-size:9px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; pointer-events:all; text-align:center; line-height:1.1; }
.skill-btn:hover { background:rgba(255,170,200,0.2); }
.skill-btn.cd { border-color:#666; color:#666; }
#msgs { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; text-align:center; }
.msg-pop { position:absolute; font-weight:bold; animation:popUp 1.5s ease-out forwards; white-space:nowrap; }
@keyframes popUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.5)} }
#boss-bar { position:absolute; top:8px; left:50%; transform:translateX(-50%); display:none; text-align:center; }
#boss-bar .boss-name { color:#ff6666; font-size:11px; font-weight:bold; margin-bottom:2px; }
#boss-bar .boss-hp-wrap { width:200px; height:12px; background:#330000; border:1px solid #ff4444; border-radius:4px; overflow:hidden; }
#boss-bar .boss-hp-fill { height:100%; background:#ff2222; transition:width 0.3s; }
#minimap { position:absolute; bottom:8px; right:8px; border:1px solid rgba(255,255,255,0.3); border-radius:4px; background:rgba(0,0,0,0.5); }
#info { position:absolute; top:8px; right:8px; color:#ffcc88; font-size:10px; text-align:right; pointer-events:none; }
#notif { position:absolute; top:30%; left:50%; transform:translateX(-50%); display:none; background:rgba(0,0,0,0.85); border:2px solid #ffaacc; border-radius:8px; padding:8px 16px; color:#ffaacc; font-size:11px; text-align:center; pointer-events:none; max-width:260px; }
#controls-hint { position:absolute; bottom:60px; right:8px; color:rgba(255,255,255,0.5); font-size:9px; text-align:right; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div style="color:#ffaacc;font-weight:bold;font-size:12px;">✦ MAPLE ✦</div>
    <div class="bar-wrap"><span style="font-size:9px;color:#88ff88;width:22px;">HP</span><div class="bar hp-bar"><div class="hp-fill" id="hp-fill"></div></div><span id="hp-txt" style="font-size:9px;color:#88ff88;"></span></div>
    <div class="bar-wrap"><span style="font-size:9px;color:#8888ff;width:22px;">MP</span><div class="bar mp-bar"><div class="mp-fill" id="mp-fill"></div></div></div>
    <div id="stat-txt" style="font-size:9px;color:#ffcc88;margin-top:2px;"></div>
    <div id="level-txt" style="font-size:9px;color:#ffaacc;"></div>
  </div>
  <div id="boss-bar">
    <div class="boss-name" id="boss-name"></div>
    <div class="boss-hp-wrap"><div class="boss-hp-fill" id="boss-hp-fill"></div></div>
  </div>
  <div id="info"></div>
  <div id="msgs"></div>
  <div id="notif"></div>
  <div id="controls-hint">WASD / Arrow: gerak<br>Z: serang<br>X: skill 1<br>C: skill 2<br>V: skill 3</div>
  <div id="skill-bar">
    <div class="skill-btn" id="sk0" onclick="useSkill(0)">🛡️<br>Block</div>
    <div class="skill-btn" id="sk1" onclick="useSkill(1)">☠️<br>Racun</div>
    <div class="skill-btn" id="sk2" onclick="useSkill(2)">🐢<br>Devour</div>
    <div class="skill-btn" id="sk3" onclick="useSkill(3)">👿<br>Throne</div>
  </div>
  <canvas id="minimap" width="80" height="80"></canvas>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mm = document.getElementById('minimap');
const mctx = mm.getContext('2d');

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// World map - tile types: 0=grass, 1=forest, 2=stone, 3=water, 4=cave, 5=crystal, 6=town, 7=wall
const TILE=32, MAP_W=60, MAP_H=60;
const map=[];
function makemap(){
  for(let y=0;y<MAP_H;y++){map[y]=[];for(let x=0;x<MAP_W;x++){map[y][x]=0;}}
  // border walls
  for(let i=0;i<MAP_W;i++){map[0][i]=7;map[MAP_H-1][i]=7;}
  for(let i=0;i<MAP_H;i++){map[i][0]=7;map[i][MAP_W-1]=7;}
  // town area
  for(let y=22;y<30;y++)for(let x=22;x<30;x++)map[y][x]=6;
  for(let y=22;y<30;y++){map[y][21]=7;map[y][30]=7;}
  for(let x=21;x<=30;x++){map[21][x]=7;map[30][x]=7;}
  map[25][21]=0;map[25][30]=0; // town gates
  // forest
  for(let y=5;y<20;y++)for(let x=3;x<20;x++)if(Math.random()<0.7)map[y][x]=1;
  for(let y=5;y<20;y++)for(let x=3;x<20;x++)if(map[y][x]!==1)map[y][x]=0;
  // stone/mountain
  for(let y=3;y<15;y++)for(let x=35;x<55;x++)if(Math.random()<0.5)map[y][x]=2;
  // water lake
  for(let y=35;y<48;y++)for(let x=5;x<18;x++)map[y][x]=3;
  for(let y=36;y<47;y++)for(let x=6;x<17;x++)map[y][x]=3;
  // crystal cavern
  for(let y=40;y<55;y++)for(let x=35;x<55;x++)if(Math.random()<0.6)map[y][x]=5;
  for(let y=40;y<55;y++)for(let x=35;x<55;x++)if(map[y][x]!==5)map[y][x]=4;
  // walls around cavern
  for(let x=34;x<56;x++){map[39][x]=7;map[55][x]=7;}
  for(let y=39;y<56;y++){map[y][34]=7;map[y][55]=7;}
  map[47][34]=0;map[47][55]=0;
}
makemap();

// Spawn points for enemies
const SLIME_ZONES=[[5,5],[10,8],[15,12],[8,15],[12,5]];
const WOLF_ZONES=[[38,5],[42,8],[48,12],[45,5],[40,10]];
const HYDRA_ZONE=[47,47];

const tileColors={0:'#3a7d44',1:'#2d5a27',2:'#7a7a7a',3:'#1a4a8a',4:'#2a1a3a',5:'#3a2a5a',6:'#8a6a3a',7:'#4a3a2a'};
const tileBrights={0:'#4a9d54',1:'#3d7a37',2:'#8a8a8a',3:'#2a5a9a',4:'#3a2a4a',5:'#5a3a7a',6:'#9a7a4a',7:'#5a4a3a'};
function isWalkable(tx,ty){
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;
  const t=map[ty][tx];
  return t!==7&&t!==3;
}

// Game state
let cam={x:0,y:0};
let player={
  x:26*TILE,y:26*TILE,
  vx:0,vy:0,
  hp:100,maxHp:100,
  mp:50,maxMp:50,
  atk:3,def:9999,spd:1.2,
  exp:0,level:1,expNext:100,
  facing:'down',
  immune:true,
  poison:false,
  poisonTime:0,
  kills:0,
  frame:0,
  frameTimer:0,
  skill_cd:[0,0,0,0],
  activeSkills:['Block','Lethal Poison','Devour Aura','Throne of Darkness'],
  throneActive:false,
  throneTimer:0,
  devourAura:false,
  devourTimer:0,
  invincTimer:0,
};

let enemies=[];
let particles=[];
let damageNums=[];
let notifications=[];
let notifTimer=0;
let notifCurrent='';
let adminShakeTimer=0;
let adminShakeX=0;

function spawnEnemies(){
  enemies=[];
  // Slimes - forest area
  SLIME_ZONES.forEach(([tx,ty],i)=>{
    enemies.push({
      type:'slime',name:'Slime'+String.fromCharCode(65+i),
      x:(tx+1)*TILE,y:(ty+1)*TILE,
      hp:80,maxHp:80,atk:15,spd:0.4,
      frame:0,frameTimer:0,agro:false,
      dead:false,deathTimer:0,
      attackTimer:0,attackCd:90,
      color:'#55ddaa',darkColor:'#22aa77',
      exp:20,loot:'Slime Gel',
    });
  });
  // Wolves - mountain area
  WOLF_ZONES.forEach(([tx,ty],i)=>{
    enemies.push({
      type:'wolf',name:'Serigala'+String.fromCharCode(65+i),
      x:(tx+1)*TILE,y:(ty+1)*TILE,
      hp:200,maxHp:200,atk:40,spd:1.0,
      frame:0,frameTimer:0,agro:false,
      dead:false,deathTimer:0,
      attackTimer:0,attackCd:60,
      color:'#aa8866',darkColor:'#775544',
      exp:60,loot:'Wolf Fang',
    });
  });
  // Hydra Boss
  enemies.push({
    type:'hydra',name:'HYDRA NAGA',
    x:HYDRA_ZONE[0]*TILE,y:HYDRA_ZONE[1]*TILE,
    hp:5000,maxHp:5000,atk:200,spd:0.3,
    frame:0,frameTimer:0,agro:false,
    dead:false,deathTimer:0,
    attackTimer:0,attackCd:120,
    color:'#226644',darkColor:'#113322',
    exp:500,loot:'Dragon Core',
    isBoss:true,
  });
}
spawnEnemies();

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;
  if(e.code==='KeyZ')tryAttack();
  if(e.code==='KeyX')useSkill(1);
  if(e.code==='KeyC')useSkill(2);
  if(e.code==='KeyV')useSkill(3);
  if(e.code==='KeyZ')useSkill(0);
  e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function showNotif(msg,color='#ffaacc'){
  document.getElementById('notif').style.display='block';
  document.getElementById('notif').style.borderColor=color;
  document.getElementById('notif').style.color=color;
  document.getElementById('notif').innerHTML=msg;
  notifTimer=300;
}

function spawnMsg(x,y,txt,color,size=14){
  damageNums.push({x,y,txt,color,size,life:90,vy:-1.5,opacity:1});
}

function tryAttack(){
  let nearest=null,nd=999999;
  const px=player.x,py=player.y;
  enemies.forEach(e=>{
    if(e.dead)return;
    const d=Math.hypot(e.x-px,e.y-py);
    if(d<80&&d<nd){nd=d;nearest=e;}
  });
  if(nearest){
    doAttack(nearest,px,py);
  } else {
    spawnMsg(px-20,py-20,'...',  '#ffaacc',10);
  }
}

function doAttack(e,px,py){
  let dmg=player.atk;
  spawnMsg(e.x,e.y-10,dmg,'#ffff44',11);
  // Apply poison
  if(player.activeSkills[1]!==null){
    e.poisoned=true;
    e.poisonDmgPerSec=Math.max(1,Math.floor(e.maxHp*0.02));
    spawnMsg(e.x+10,e.y-20,'POISONED! ☠️','#88ff44',10);
  }
  e.hp-=dmg;
  if(e.hp<=0)killEnemy(e);
  // Particle
  for(let i=0;i<5;i++){
    particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
      color:'#ffff44',life:20,size:2});
  }
}

function useSkill(idx){
  if(player.skill_cd[idx]>0)return;
  const now=performance.now();
  if(idx===0){
    // Super Block - invincible for 5s
    player.invincTimer=300;
    spawnMsg(player.x,player.y-30,'🛡️ SHIELD WALL!','#aaaaff',14);
    for(let i=0;i<15;i++)particles.push({x:player.x,y:player.y,
      vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,color:'#aaaaff',life:40,size:3});
    player.skill_cd[0]=180;
  } else if(idx===1){
    // AOE Poison
    let hit=0;
    enemies.forEach(e=>{
      if(!e.dead&&Math.hypot(e.x-player.x,e.y-player.y)<120){
        e.poisoned=true;e.poisonDmgPerSec=Math.max(1,Math.floor(e.maxHp*0.03));
        hit++;
        for(let i=0;i<8;i++)particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,color:'#88ff44',life:30,size:2});
      }
    });
    spawnMsg(player.x,player.y-30,`☠️ HYDRA POISON x${hit}!`,'#88ff44',12);
    player.skill_cd[1]=240;
  } else if(idx===2){
    // Devour Aura - for 8s deal damage to nearby enemies
    player.devourAura=true;
    player.devourTimer=480;
    spawnMsg(player.x,player.y-30,'🐢 DEVOUR AURA!','#ff88aa',13);
    player.skill_cd[2]=360;
  } else if(idx===3){
    // Throne of Darkness
    player.throneActive=true;
    player.throneTimer=600;
    spawnMsg(player.x,player.y-40,'👿 THRONE OF DARKNESS!','#cc44ff',15);
    adminShakeTimer=180;
    showNotif('⚠️ [ADMIN]: DIA MELAKUKANNYA LAGI!!\nDEF OVERFLOW ERROR!\nBLUE SCREEN!!','#ff4444');
    player.skill_cd[3]=600;
  }
}

function killEnemy(e){
  if(e.dead)return;
  e.dead=true;
  e.deathTimer=60;
  player.exp+=e.exp;
  player.kills++;
  for(let i=0;i<20;i++)particles.push({
    x:e.x,y:e.y,
    vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
    color:e.color,life:40,size:3+Math.random()*3
  });
  spawnMsg(e.x,e.y-20,`+${e.exp} EXP`,'#ffdd00',13);
  spawnMsg(e.x,e.y-35,`[${e.loot}]`,'#aaffaa',10);
  // Achievement
  let ach='';
  if(e.isBoss)ach=`🏆 [Didn't Even Flinch]\nMengalahkan ${e.name}\ntanpa menerima damage!`;
  else ach=`✓ ${e.name} dikalahkan!`;
  showNotif(ach, e.isBoss?'#ffdd00':'#ffaacc');
  if(e.isBoss)adminShakeTimer=300;
  checkLevel();
}

function checkLevel(){
  while(player.exp>=player.expNext){
    player.exp-=player.expNext;
    player.level++;
    player.expNext=Math.floor(player.expNext*1.5);
    player.maxHp+=20;player.hp=player.maxHp;
    showNotif(`✨ LEVEL UP! Lv.${player.level}\nVIT +20 | HP Penuh!`,'#ffddaa');
    for(let i=0;i<30;i++)particles.push({x:player.x,y:player.y,
      vx:(Math.random()-0.5)*8,vy:(Math.random()-1)*8,color:'#ffddaa',life:60,size:3});
  }
}

let tick=0;
function update(){
  tick++;
  // Camera
  const sw=canvas.width,sh=canvas.height;
  const targCamX=player.x-sw/2;
  const targCamY=player.y-sh/2;
  cam.x+=(targCamX-cam.x)*0.1;
  cam.y+=(targCamY-cam.y)*0.1;

  // Admin shake
  if(adminShakeTimer>0){
    adminShakeTimer--;
    adminShakeX=adminShakeTimer>0?(Math.random()-0.5)*4:0;
  }

  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA']){dx=-1;player.facing='left';}
  if(keys['ArrowRight']||keys['KeyD']){dx=1;player.facing='right';}
  if(keys['ArrowUp']||keys['KeyW']){dy=-1;player.facing='up';}
  if(keys['ArrowDown']||keys['KeyS']){dy=1;player.facing='down';}
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  const nx=player.x+dx*player.spd*60/60;
  const ny=player.y+dy*player.spd*60/60;
  const ptx=Math.floor(player.x/TILE),pty=Math.floor(player.y/TILE);
  const ntx=Math.floor(nx/TILE),nty=Math.floor(ny/TILE);
  if(isWalkable(ntx,pty))player.x=nx;
  if(isWalkable(ptx,nty))player.y=ny;

  // Player timers
  if(player.invincTimer>0)player.invincTimer--;
  if(player.devourTimer>0)player.devourTimer--;else player.devourAura=false;
  if(player.throneTimer>0)player.throneTimer--;else player.throneActive=false;
  player.skill_cd=player.skill_cd.map(c=>Math.max(0,c-1));

  // Devour aura damage
  if(player.devourAura&&tick%20===0){
    enemies.forEach(e=>{
      if(!e.dead&&Math.hypot(e.x-player.x,e.y-player.y)<100){
        const dmg=Math.max(1,Math.floor(e.maxHp*0.01));
        e.hp-=dmg;
        spawnMsg(e.x,e.y-10,'🐢'+dmg,'#ff88aa',10);
        if(e.hp<=0)killEnemy(e);
      }
    });
  }

  // Throne aura damage
  if(player.throneActive&&tick%30===0){
    enemies.forEach(e=>{
      if(!e.dead&&Math.hypot(e.x-player.x,e.y-player.y)<150){
        const dmg=Math.max(1,Math.floor(e.maxHp*0.015));
        e.hp-=dmg;
        spawnMsg(e.x,e.y-15,'👿'+dmg,'#cc44ff',10);
        if(e.hp<=0)killEnemy(e);
      }
    });
  }

  // Enemy AI
  enemies.forEach(e=>{
    if(e.dead){e.deathTimer--;return;}
    const dist=Math.hypot(e.x-player.x,e.y-player.y);
    const aggroRange=e.isBoss?200:120;
    if(dist<aggroRange)e.agro=true;
    if(dist>400)e.agro=false;

    if(e.agro&&dist>TILE*0.8){
      const ex=e.x,ey=e.y;
      const ddx=(player.x-ex)/dist;
      const ddy=(player.y-ey)/dist;
      const nx2=ex+ddx*e.spd;
      const ny2=ey+ddy*e.spd;
      const etx=Math.floor(ex/TILE),ety=Math.floor(ey/TILE);
      if(isWalkable(Math.floor(nx2/TILE),ety))e.x=nx2;
      if(isWalkable(etx,Math.floor(ny2/TILE)))e.y=ny2;
    }

    // Enemy attack
    e.attackTimer++;
    if(e.agro&&dist<36&&e.attackTimer>=e.attackCd){
      e.attackTimer=0;
      const invinc=player.invincTimer>0||player.immune;
      if(invinc){
        spawnMsg(player.x,player.y-25,'0','#aaaaff',16);
        spawnMsg(player.x-10,player.y-35,'IMMUNE','#aaaaff',9);
        for(let i=0;i<6;i++)particles.push({x:player.x,y:player.y,
          vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,color:'#aaaaff',life:20,size:2});
      } else {
        // In theory player takes damage but VIT is max so...
        spawnMsg(player.x,player.y-25,'0','#aaaaff',14);
      }
    }

    // Poison tick
    if(e.poisoned&&tick%60===0){
      const pdmg=e.poisonDmgPerSec||1;
      e.hp-=pdmg;
      spawnMsg(e.x+5,e.y-12,'☠️'+pdmg,'#88ff44',9);
      if(e.hp<=0)killEnemy(e);
    }

    // Animation
    e.frameTimer++;
    if(e.frameTimer>15){e.frameTimer=0;e.frame=1-e.frame;}
  });

  // Particles
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;
  });

  // Damage numbers
  damageNums=damageNums.filter(d=>{
    d.y+=d.vy;d.life--;d.opacity=d.life/90;return d.life>0;
  });

  // Notifications
  if(notifTimer>0){notifTimer--;if(notifTimer<=0)document.getElementById('notif').style.display='none';}

  // Animation
  player.frameTimer++;
  if(player.frameTimer>10){player.frameTimer=0;player.frame=1-player.frame;}

  // Update HUD
  document.getElementById('hp-fill').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('mp-fill').style.width=(player.mp/player.maxMp*100)+'%';
  document.getElementById('hp-txt').textContent=`${player.hp}/${player.maxHp}`;
  document.getElementById('stat-txt').textContent=`ATK:${player.atk} DEF:∞ SPD:${player.spd.toFixed(1)}`;
  document.getElementById('level-txt').textContent=`Lv.${player.level} | EXP:${player.exp}/${player.expNext} | Kill:${player.kills}`;
  
  const sk=document.querySelectorAll('.skill-btn');
  const skNames=['🛡️Shield','☠️Poison','🐢Devour','👿Throne'];
  player.skill_cd.forEach((cd,i)=>{
    const el=document.getElementById('sk'+i);
    if(cd>0){el.classList.add('cd');el.innerHTML=`⏳<br>${Math.ceil(cd/60)}s`;}
    else{el.classList.remove('cd');el.innerHTML=skNames[i];}
  });
  
  // Boss bar
  const boss=enemies.find(e=>e.isBoss&&!e.dead);
  const bossBar=document.getElementById('boss-bar');
  if(boss){
    bossBar.style.display='block';
    document.getElementById('boss-name').textContent='⚔️ '+boss.name;
    document.getElementById('boss-hp-fill').style.width=(boss.hp/boss.maxHp*100)+'%';
  } else {
    bossBar.style.display='none';
  }

  // Info panel
  const zone=getZoneName();
  document.getElementById('info').innerHTML=
    `[${zone}]<br>坐标 ${Math.floor(player.x/TILE)},${Math.floor(player.y/TILE)}`;
}

function getZoneName(){
  const tx=Math.floor(player.x/TILE),ty=Math.floor(player.y/TILE);
  if(ty<20&&tx<20)return'Lush Forest';
  if(tx>35&&ty<20)return'Crystal Mountain';
  if(tx>22&&tx<30&&ty>22&&ty<30)return'Town of Beginnings';
  if(ty>35&&tx<20)return'Lakeside';
  if(tx>34&&ty>39)return'Crystal Caverns (Boss Area)';
  return'Open Fields';
}

function drawTile(tx,ty,cx,cy){
  const t=map[ty]?map[ty][tx]:7;
  const col=tileColors[t]||'#3a7d44';
  const bright=tileBrights[t]||'#4a9d54';
  ctx.fillStyle=col;
  ctx.fillRect(cx,cy,TILE,TILE);
  if(t===6){// town
    ctx.fillStyle='#7a5a2a';
    ctx.fillRect(cx+2,cy+2,TILE-4,TILE-4);
    ctx.fillStyle='#aa8a4a';
    if(tick%60<30){ctx.fillRect(cx+12,cy+12,8,8);}
  } else if(t===1){// forest
    ctx.fillStyle=bright;
    const offset=(tx*7+ty*11)%8;
    ctx.fillRect(cx+offset,cy+offset,8,8);
  } else if(t===5){// crystal
    ctx.fillStyle='#8866cc';
    const px2=(tx*13+ty*7)%12;
    ctx.beginPath();ctx.moveTo(cx+px2,cy+8);ctx.lineTo(cx+px2+4,cy);ctx.lineTo(cx+px2+8,cy+8);ctx.fill();
  } else if(t===3){// water
    ctx.fillStyle=bright;
    const wave=Math.sin(tick*0.05+tx*0.3+ty*0.2)*3;
    ctx.fillRect(cx+4,cy+8+wave,TILE-8,4);
  }
}

function drawPlayer(){
  const sx=player.x-cam.x;
  const sy=player.y-cam.y;
  const f=player.frame;
  const invinc=player.invincTimer>0;
  const throne=player.throneActive;
  
  // Throne effect
  if(throne){
    ctx.save();
    ctx.globalAlpha=0.3+Math.sin(tick*0.1)*0.1;
    ctx.fillStyle='#cc44ff';
    ctx.beginPath();ctx.arc(sx,sy,60,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  }

  // Devour aura
  if(player.devourAura){
    ctx.save();
    ctx.globalAlpha=0.2+Math.sin(tick*0.15)*0.1;
    ctx.fillStyle='#ff88aa';
    ctx.beginPath();ctx.arc(sx,sy,100,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(sx,sy+12,10,4,0,0,Math.PI*2);ctx.fill();

  // Shield/body
  const blink=invinc&&tick%6<3;
  if(!blink){
    // Big shield heart shape
    ctx.fillStyle='#ff88cc';
    ctx.save();ctx.translate(sx-12,sy-4);
    ctx.scale(0.5,0.5);
    ctx.beginPath();
    ctx.moveTo(20,10);
    ctx.bezierCurveTo(20,5,10,0,5,8);
    ctx.bezierCurveTo(0,0,-10,5,-10,10);
    ctx.bezierCurveTo(-10,20,20,35,20,35);
    ctx.bezierCurveTo(20,35,50,20,50,10);
    ctx.bezierCurveTo(50,5,40,0,35,8);
    ctx.bezierCurveTo(30,0,20,5,20,10);
    ctx.fill();
    ctx.restore();
    
    // Body (heavy armor)
    ctx.fillStyle='#8899bb';
    ctx.fillRect(sx-8,sy-10,16,16);
    // Head
    ctx.fillStyle='#ffddbb';
    ctx.fillRect(sx-6,sy-20,12,12);
    // Helmet (slightly tilted)
    ctx.fillStyle='#8899bb';
    ctx.save();ctx.translate(sx,sy-20);ctx.rotate(0.15);
    ctx.fillRect(-8,-8,16,8);ctx.restore();
    // Cheeks puffed
    ctx.fillStyle='#ffbbcc';
    ctx.beginPath();ctx.arc(sx-8,sy-13,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+8,sy-13,3,0,Math.PI*2);ctx.fill();
    // Tiny dagger
    ctx.strokeStyle='#ffaaaa';ctx.lineWidth=2;
    const daggerAngle=Math.sin(tick*0.1)*0.3;
    ctx.save();ctx.translate(sx+10,sy-5);ctx.rotate(daggerAngle);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-12);ctx.stroke();
    ctx.fillStyle='#ffaaaa';ctx.fillRect(-2,-14,4,3);
    ctx.restore();
    // Sparkles
    if(tick%10<5){
      ctx.fillStyle='#ffff88';
      [[sx+14,sy-12],[sx+18,sy-8]].forEach(([px,py])=>{
        ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
      });
    }
    // Legs
    const legSwing=f===0?2:-2;
    ctx.fillStyle='#667799';
    ctx.fillRect(sx-7,sy+6,6,8+legSwing);
    ctx.fillRect(sx+1,sy+6,6,8-legSwing);
    // Bobble animation
    ctx.fillStyle='#ffaaee';
    const bob=f===0?-1:1;
    ctx.beginPath();ctx.arc(sx,sy-24+bob,2,0,Math.PI*2);ctx.fill();
  }
  
  // Name tag
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(sx-20,sy-34,40,10);
  ctx.fillStyle='#ffaacc';
  ctx.font='8px monospace';
  ctx.textAlign='center';
  ctx.fillText('Maple',sx,sy-26);
}

function drawEnemy(e){
  if(e.dead&&e.deathTimer<=0)return;
  const sx=e.x-cam.x,sy=e.y-cam.y;
  const alpha=e.dead?e.deathTimer/60:1;
  ctx.save();ctx.globalAlpha=alpha;
  const f=e.frame;
  
  if(e.type==='slime'){
    // Slime body
    const squish=f===0?1:0.85;
    ctx.fillStyle=e.color;
    ctx.beginPath();
    ctx.ellipse(sx,sy,12,10*squish,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=e.darkColor;
    ctx.beginPath();ctx.ellipse(sx,sy+2,10,7*squish,0,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx-4,sy-2*squish,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+4,sy-2*squish,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(sx-3,sy-2*squish,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+5,sy-2*squish,1.5,0,Math.PI*2);ctx.fill();
  } else if(e.type==='wolf'){
    // Wolf body
    ctx.fillStyle=e.color;
    const run=f===0?0:2;
    ctx.fillRect(sx-12,sy-8,24,14);
    // Head
    ctx.fillStyle=e.darkColor;
    ctx.fillRect(sx+8,sy-12,12,12);
    // Ears
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.moveTo(sx+10,sy-12);ctx.lineTo(sx+13,sy-20);ctx.lineTo(sx+16,sy-12);ctx.fill();
    ctx.beginPath();ctx.moveTo(sx+16,sy-12);ctx.lineTo(sx+19,sy-18);ctx.lineTo(sx+22,sy-12);ctx.fill();
    // Eyes
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(sx+12,sy-8,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(sx+18,sy-8,2,0,Math.PI*2);ctx.fill();
    // Legs
    ctx.fillStyle=e.darkColor;
    ctx.fillRect(sx-10,sy+6,5,8+run);ctx.fillRect(sx-3,sy+6,5,6-run);
    ctx.fillRect(sx+4,sy+6,5,8+run);ctx.fillRect(sx+11,sy+6,5,6-run);
    // Tail
    ctx.strokeStyle=e.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx-12,sy);ctx.quadraticCurveTo(sx-20,sy-10+run,sx-24,sy-6);ctx.stroke();
  } else if(e.type==='hydra'){
    // Hydra boss - big dragon
    const scale=1.8;
    ctx.save();ctx.translate(sx,sy);
    // Body
    ctx.fillStyle=e.color;
    ctx.fillRect(-20*scale,-12*scale,40*scale,24*scale);
    // Multiple heads (3)
    for(let h=0;h<3;h++){
      const hx=(-1+h)*14*scale;
      const hy=-12*scale-8*scale+Math.sin(tick*0.05+h*2)*4;
      ctx.fillStyle=e.darkColor;
      ctx.fillRect(hx-6*scale,hy-8*scale,12*scale,10*scale);
      // Eyes
      ctx.fillStyle='#ff2222';
      ctx.beginPath();ctx.arc(hx-3*scale,hy-3*scale,2*scale,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(hx+3*scale,hy-3*scale,2*scale,0,Math.PI*2);ctx.fill();
      // Horns
      ctx.strokeStyle='#884422';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(hx-4*scale,hy-8*scale);ctx.lineTo(hx-2*scale,hy-16*scale);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hx+4*scale,hy-8*scale);ctx.lineTo(hx+2*scale,hy-16*scale);ctx.stroke();
      // Fire breath animation
      if(e.agro&&tick%40<15){
        ctx.fillStyle='rgba(255,100,0,0.7)';
        for(let fi=0;fi<3;fi++){
          const fsize=(tick%40)*0.5+fi*4;
          ctx.beginPath();ctx.arc(hx,hy-8*scale-fsize,4+fi*3,0,Math.PI*2);ctx.fill();
        }
      }
    }
    // Legs
    ctx.fillStyle=e.darkColor;
    for(let l=-1;l<=1;l+=2){
      ctx.fillRect(l*15*scale,8*scale,6*scale,14*scale);
    }
    // Wings
    ctx.strokeStyle='#336644';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-20*scale,-5*scale);
    ctx.quadraticCurveTo(-40*scale,-25*scale+(f?4:0),-50*scale,-10*scale);ctx.stroke();
    ctx.beginPath();ctx.moveTo(20*scale,-5*scale);
    ctx.quadraticCurveTo(40*scale,-25*scale+(f?4:0),50*scale,-10*scale);ctx.stroke();
    ctx.restore();
    // Aura
    if(e.agro){
      ctx.save();ctx.globalAlpha=0.15+Math.sin(tick*0.08)*0.05;
      ctx.fillStyle='#ff2222';
      ctx.beginPath();ctx.arc(sx,sy,60,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=alpha;ctx.restore();
    }
  }

  // HP bar
  if(!e.dead&&e.agro){
    const bw=e.isBoss?50:30;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(sx-bw/2,sy-30,bw,5);
    ctx.fillStyle=e.isBoss?'#ff2222':'#22cc22';
    ctx.fillRect(sx-bw/2,sy-30,bw*(e.hp/e.maxHp),5);
  }
  // Poison indicator
  if(e.poisoned&&!e.dead){
    ctx.fillStyle='#88ff44';
    ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('☠',sx,sy-32);
  }
  ctx.restore();
}

function drawWorld(){
  const sx=Math.floor(cam.x/TILE)-1;
  const sy2=Math.floor(cam.y/TILE)-1;
  const ex=sx+Math.ceil(canvas.width/TILE)+2;
  const ey=sy2+Math.ceil(canvas.height/TILE)+2;
  for(let ty=sy2;ty<ey;ty++){
    for(let tx=sx;tx<ex;tx++){
      if(ty<0||tx<0||ty>=MAP_H||tx>=MAP_W)continue;
      drawTile(tx,ty,tx*TILE-cam.x,ty*TILE-cam.y);
    }
  }
  // Town decorations
  const tx0=22,ty0=22;
  for(let i=0;i<3;i++){
    const bx=(tx0+1+i*2)*TILE-cam.x;
    const by=(ty0+1)*TILE-cam.y;
    if(bx>-50&&bx<canvas.width+50){
      // House
      ctx.fillStyle='#aa7744';
      ctx.fillRect(bx,by,28,20);
      ctx.fillStyle='#cc4444';
      ctx.beginPath();ctx.moveTo(bx-4,by);ctx.lineTo(bx+16,by-16);ctx.lineTo(bx+36,by);ctx.fill();
      // Heart chimney
      ctx.fillStyle='#884444';ctx.fillRect(bx+20,by-24,5,12);
      if(tick%60<30){ctx.fillStyle='rgba(150,150,150,0.5)';ctx.beginPath();ctx.arc(bx+22,by-28,4,0,Math.PI*2);ctx.fill();}
    }
  }
}

function drawDamageNums(){
  damageNums.forEach(d=>{
    ctx.save();
    ctx.globalAlpha=d.opacity;
    ctx.font=`bold ${d.size}px monospace`;
    ctx.fillStyle=d.color;
    ctx.textAlign='center';
    ctx.fillText(d.txt,d.x-cam.x,d.y-cam.y);
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x-cam.x,p.y-cam.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawMinimap(){
  mctx.fillStyle='rgba(0,0,0,0.8)';
  mctx.fillRect(0,0,80,80);
  const scale=80/MAP_W;
  for(let ty=0;ty<MAP_H;ty++){
    for(let tx=0;tx<MAP_W;tx++){
      const t=map[ty][tx];
      mctx.fillStyle=tileColors[t];
      mctx.fillRect(tx*scale,ty*scale,scale,scale);
    }
  }
  // Enemies on minimap
  enemies.forEach(e=>{
    if(e.dead)return;
    mctx.fillStyle=e.isBoss?'#ff2222':e.type==='wolf'?'#ff8800':'#ffff00';
    mctx.fillRect(e.x/TILE*scale-1,e.y/TILE*scale-1,2,2);
  });
  // Player
  mctx.fillStyle='#ffaacc';
  mctx.beginPath();mctx.arc(player.x/TILE*scale,player.y/TILE*scale,2,0,Math.PI*2);mctx.fill();
}

function drawAdminPanel(){
  if(adminShakeTimer<=0&&!player.throneActive)return;
  const t=player.throneActive||adminShakeTimer>0;
  if(!t)return;
  ctx.save();
  ctx.translate(adminShakeX,0);
  // Admin room overlay (top right corner)
  const pw=140,ph=60;
  const px2=canvas.width-pw-8,py=68;
  ctx.fillStyle='rgba(0,0,30,0.85)';
  ctx.strokeStyle='#4444ff';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(px2,py,pw,ph,4);ctx.fill();ctx.stroke();
  // Monitor
  ctx.fillStyle='#001166';ctx.fillRect(px2+8,py+8,50,35);
  // Error screen
  if(adminShakeTimer>0){
    ctx.fillStyle='#0000ff';ctx.fillRect(px2+8,py+8,50,35);
    ctx.fillStyle='#ffffff';ctx.font='5px monospace';
    ctx.fillText('BLUE SCREEN',px2+10,py+20);
    ctx.fillText('DEF OVERFLOW',px2+10,py+28);
    ctx.fillText('ERR: 0xDEF∞',px2+10,py+36);
  } else {
    // Normal monitor with graph
    ctx.strokeStyle='#ff4444';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px2+10,py+30);
    for(let i=0;i<40;i++){ctx.lineTo(px2+10+i,py+30-Math.sin(i*0.5+tick*0.2)*8);}
    ctx.stroke();
  }
  // Admin NPCs (panicking)
  const wobble=adminShakeTimer>0?Math.sin(tick*0.5)*3:0;
  // NPC 1
  ctx.fillStyle='#9988cc';
  ctx.fillRect(px2+68,py+20+wobble,8,20);
  ctx.fillStyle='#ffddbb';ctx.beginPath();ctx.arc(px2+72,py+16+wobble,6,0,Math.PI*2);ctx.fill();
  // Speech bubble
  if(adminShakeTimer>0){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.roundRect(px2+78,py+5,55,18,3);ctx.fill();
    ctx.fillStyle='#ff0000';ctx.font='6px monospace';
    ctx.fillText('NERF DIA!!',px2+80,py+14);
    ctx.fillText('GIMANA CARANYA??',px2+80,py+20);
  }
  // NPC 2
  ctx.fillStyle='#cc8866';
  ctx.fillRect(px2+100,py+22+Math.sin(tick*0.3)*2,8,18);
  ctx.fillStyle='#ffddbb';ctx.beginPath();ctx.arc(px2+104,py+18+Math.sin(tick*0.3)*2,5,0,Math.PI*2);ctx.fill();
  // Label
  ctx.fillStyle='rgba(100,100,255,0.8)';
  ctx.fillRect(px2,py,pw,10);
  ctx.fillStyle='#aaaaff';ctx.font='6px monospace';ctx.textAlign='left';
  ctx.fillText('⚙ Admin Control Room',px2+4,py+7);
  ctx.restore();
}

function loop(){
  update();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  if(adminShakeTimer>0)ctx.translate(adminShakeX*0.3,0);
  drawWorld();
  enemies.forEach(e=>drawEnemy(e));
  drawPlayer();
  drawParticles();
  drawDamageNums();
  ctx.restore();
  drawAdminPanel();
  drawMinimap();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
