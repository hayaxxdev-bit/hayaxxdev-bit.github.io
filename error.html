<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#030108" />
  <title>500 · Server Error | hayaxxdev</title>
  <meta name="description" content="Terjadi kesalahan pada server. Tim Maple Tree sedang memperbaikinya!" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💥</text></svg>" />

  <!-- Fonts: Modern Manga Aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES (Design Tokens)
       ============================================================ */
    :root {
      /* Palette: Cyber-Manga Void */
      --void-deepest: #030108;
      --void-deep: #05020c;
      --void: #080314;
      --void-surface: #0f0720;
      --void-surface-2: #160b2d;
      --void-surface-3: #1e103a;

      /* Accent: Neo Crimson / Rose / Purple (Error Theme) */
      --neon-crimson: #f43f5e;
      --neon-crimson-glow: rgba(244, 63, 94, 0.55);
      --neon-rose: #fb7185;
      --neon-rose-glow: rgba(251, 113, 133, 0.5);
      --neon-purple: #a855f7;
      --neon-purple-glow: rgba(168, 85, 247, 0.4);
      --neon-amber: #f59e0b;
      --neon-amber-glow: rgba(245, 158, 11, 0.4);

      /* Neutrals */
      --white: #f8fafc;
      --gray-100: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-500: #94a3b8;
      --gray-700: #475569;
      --gray-900: #1e1b2e;

      /* Typography */
      --font-manga: 'Zen Kaku Gothic New', 'Kanit', 'Outfit', sans-serif;
      --font-display: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Inter', 'Plus Jakarta Sans', system-ui;
      --font-mono: 'JetBrains Mono', monospace;

      /* Spacing & Radius */
      --space-xs: 6px;
      --space-sm: 12px;
      --space-md: 20px;
      --space-lg: 28px;
      --space-xl: 40px;
      --space-2xl: 56px;
      --radius-sm: 10px;
      --radius-md: 18px;
      --radius-lg: 26px;
      --radius-xl: 34px;
      --radius-full: 9999px;

      /* Effects */
      --glass-bg: rgba(8, 3, 20, 0.7);
      --glass-border: rgba(244, 63, 94, 0.3);
      --shadow-float: 0 25px 50px -10px rgba(0,0,0,0.7), 0 0 0 1px rgba(244, 63, 94, 0.25);
      --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-body);
      background: var(--void-deepest);
      color: var(--gray-300);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
      line-height: 1.5;
      padding: 1.5rem;
    }

    /* ============================================================
       MODULAR BACKGROUND LAYER
       ============================================================ */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-layer__orbs {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 30% 25%, rgba(244,63,94,0.22) 0%, transparent 45%),
        radial-gradient(circle at 70% 60%, rgba(251,113,133,0.18) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(168,85,247,0.1) 0%, transparent 55%),
        radial-gradient(circle at 20% 75%, rgba(245,158,11,0.08) 0%, transparent 45%);
    }
    .bg-layer__grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(244,63,94,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251,113,133,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 35%, transparent 75%);
    }
    .bg-layer__scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
      opacity: 0.2;
      mix-blend-mode: overlay;
    }
    .bg-layer__particles {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(1px 1px at 15% 20%, rgba(244,63,94,0.6), transparent),
        radial-gradient(1px 1px at 35% 55%, rgba(251,113,133,0.5), transparent),
        radial-gradient(1px 1px at 55% 35%, rgba(168,85,247,0.5), transparent),
        radial-gradient(1px 1px at 70% 70%, rgba(244,63,94,0.5), transparent),
        radial-gradient(1.5px 1.5px at 85% 20%, rgba(251,113,133,0.6), transparent),
        radial-gradient(1px 1px at 25% 75%, rgba(245,158,11,0.4), transparent),
        radial-gradient(1px 1px at 60% 15%, rgba(244,63,94,0.5), transparent);
      background-size: 200px 200px;
      animation: particleDrift 22s linear infinite;
    }
    @keyframes particleDrift {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(0.5deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* ============================================================
       MAIN CARD CONTAINER
       ============================================================ */
    .error-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 620px;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-float), 0 0 80px rgba(244, 63, 94, 0.18);
      overflow: hidden;
      transition: all 0.4s var(--transition-smooth);
    }
    .error-card:hover {
      border-color: rgba(251, 113, 133, 0.55);
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8), 0 0 110px rgba(244, 63, 94, 0.28);
    }

    /* Card decorative top line (Error/Danger stripe) */
    .card__edge {
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2.5px;
      background: repeating-linear-gradient(90deg, 
        var(--neon-crimson) 0px, var(--neon-crimson) 10px,
        transparent 10px, transparent 20px,
        var(--neon-rose) 20px, var(--neon-rose) 30px,
        transparent 30px, transparent 40px);
      z-index: 5;
      animation: dangerStripe 4s linear infinite;
    }
    @keyframes dangerStripe {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }

    /* Corner brackets */
    .card__bracket {
      position: absolute;
      width: 26px; height: 26px;
      border: 2px solid transparent;
      z-index: 4;
      transition: 0.3s;
    }
    .card__bracket--tl { top: 16px; left: 16px; border-top: 2px solid var(--neon-crimson); border-left: 2px solid var(--neon-crimson); border-radius: 5px 0 0 0; }
    .card__bracket--tr { top: 16px; right: 16px; border-top: 2px solid var(--neon-rose); border-right: 2px solid var(--neon-rose); border-radius: 0 5px 0 0; }
    .card__bracket--bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--neon-rose); border-left: 2px solid var(--neon-rose); border-radius: 0 0 0 5px; }
    .card__bracket--br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--neon-crimson); border-right: 2px solid var(--neon-crimson); border-radius: 0 0 5px 0; }

    .card__body {
      position: relative;
      z-index: 2;
      padding: 2.8rem 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.5rem;
    }

    /* ============================================================
       MODULE: ERROR ILLUSTRATION (MANGA STYLE)
       ============================================================ */
    .illustration {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 0.2rem;
    }
    .illustration__wrapper {
      position: relative;
      display: inline-block;
    }
    .illustration__emote {
      font-size: 5.5rem;
      filter: drop-shadow(0 0 35px rgba(244,63,94,0.8)) drop-shadow(0 12px 20px rgba(0,0,0,0.8));
      animation: floatDistress 3.5s infinite ease-in-out;
      display: block;
      line-height: 1;
      position: relative;
      z-index: 2;
    }
    .illustration__spark {
      position: absolute;
      font-size: 1.6rem;
      animation: sparkExplode 2.2s infinite ease-in-out;
      filter: drop-shadow(0 0 10px rgba(251,113,133,0.9));
      z-index: 3;
    }
    .illustration__spark--1 { top: -8px; right: -20px; animation-delay: 0s; }
    .illustration__spark--2 { bottom: 5px; left: -25px; animation-delay: 0.7s; font-size: 1.2rem; }
    .illustration__spark--3 { top: 12px; left: -22px; animation-delay: 1.4s; font-size: 1rem; }

    @keyframes floatDistress {
      0%,100% { transform: translateY(0) rotate(0deg); }
      15% { transform: translateY(-8px) rotate(-3deg); }
      35% { transform: translateY(-4px) rotate(3deg); }
      55% { transform: translateY(-14px) rotate(-2deg); }
      75% { transform: translateY(-6px) rotate(1deg); }
    }
    @keyframes sparkExplode {
      0%,100% { transform: translateY(0) scale(0.6); opacity: 0.2; }
      50% { transform: translateY(-20px) scale(1.4); opacity: 1; }
    }

    /* ============================================================
       MODULE: ERROR CODE (BOLD MANGA TYPO)
       ============================================================ */
    .error-code {
      font-family: var(--font-manga);
      font-weight: 900;
      font-size: clamp(5rem, 15vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, #fecaca 0%, #f87171 35%, #e11d48 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 35px rgba(244,63,94,0.7)) drop-shadow(0 6px 12px #000);
      margin: -0.4rem 0;
      position: relative;
    }

    /* ============================================================
       MODULE: TITLE SECTION
       ============================================================ */
    .title-section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .title-jp {
      font-family: var(--font-manga);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--neon-rose);
      text-transform: uppercase;
      opacity: 0.95;
    }
    .title-main {
      font-family: var(--font-display);
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.04em;
    }
    .title-separator {
      width: 70px;
      height: 3px;
      background: linear-gradient(90deg, var(--neon-crimson), var(--neon-rose), var(--neon-purple));
      margin: 0.25rem auto 0;
      border-radius: 4px;
    }

    /* ============================================================
       MODULE: DIALOGUE BUBBLE (MANGA STYLE)
       ============================================================ */
    .speech-bubble {
      background: rgba(15, 7, 32, 0.8);
      border: 1px solid rgba(244,63,94,0.5);
      border-radius: 20px 20px 20px 6px;
      padding: 1.3rem 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      text-align: left;
      backdrop-filter: blur(12px);
      box-shadow: 0 15px 30px -10px rgba(0,0,0,0.7);
      transition: 0.3s;
    }
    .speech-bubble:hover {
      border-color: var(--neon-rose);
      box-shadow: 0 0 28px rgba(251,113,133,0.35);
    }
    .speech-bubble__avatar {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 12px var(--neon-crimson-glow));
      flex-shrink: 0;
    }
    .speech-bubble__text {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--gray-100);
      font-style: italic;
    }
    .speech-bubble__text strong {
      color: var(--neon-rose);
      font-weight: 700;
      font-style: normal;
    }

    /* ============================================================
       MODULE: ACTION BUTTONS (FUTURISTIC)
       ============================================================ */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      width: 100%;
      margin-top: 0.3rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      border: 1px solid transparent;
      backdrop-filter: blur(10px);
      transition: all 0.3s var(--transition-smooth);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .btn--primary {
      background: linear-gradient(135deg, #be123c, #e11d48);
      color: white;
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 8px 25px rgba(244,63,94,0.5);
    }
    .btn--primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(244,63,94,0.8);
      border-color: white;
    }
    .btn--secondary {
      background: rgba(20, 10, 40, 0.7);
      color: var(--gray-100);
      border-color: rgba(168,85,247,0.5);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .btn--secondary:hover {
      background: rgba(168,85,247,0.2);
      border-color: var(--neon-purple);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(168,85,247,0.4);
    }
    .btn svg {
      width: 1.2rem;
      height: 1.2rem;
      transition: transform 0.2s;
    }
    .btn:hover svg { transform: translateX(3px); }
    .btn--secondary:hover svg { transform: translateX(4px); }

    /* ============================================================
       MODULE: STATUS ROW
       ============================================================ */
    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--gray-500);
      background: rgba(0,0,0,0.4);
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      border: 1px solid rgba(244,63,94,0.25);
      margin-top: 0.2rem;
    }
    .status-row__item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .status-row__label {
      color: var(--neon-rose);
      font-weight: 600;
    }
    .status-row__value {
      color: var(--gray-100);
    }
    .status-row__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon-crimson);
      box-shadow: 0 0 8px var(--neon-crimson-glow);
      animation: dotPulse 1.8s infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    /* ============================================================
       MODULE: FOOTER NOTE
       ============================================================ */
    .footer-note {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--gray-700);
      letter-spacing: 0.05em;
      margin-top: -0.3rem;
    }
    .footer-note span {
      color: var(--neon-rose);
      font-weight: 600;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 500px) {
      .card__body { padding: 2rem 1.4rem; gap: 1.2rem; }
      .illustration__emote { font-size: 4rem; }
      .illustration__spark { font-size: 1.2rem; }
      .illustration__spark--2 { font-size: 1rem; }
      .illustration__spark--3 { font-size: 0.9rem; }
      .speech-bubble { flex-direction: column; align-items: center; text-align: center; }
      .btn { width: 100%; justify-content: center; }
      .error-code { font-size: 3.8rem; }
      .status-row { flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>
<body>
  <!-- Background Layer -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-layer__orbs"></div>
    <div class="bg-layer__grid"></div>
    <div class="bg-layer__scanlines"></div>
    <div class="bg-layer__particles"></div>
  </div>

  <!-- Main Error Card -->
  <main class="error-card">
    <div class="card__edge" aria-hidden="true"></div>
    <div class="card__bracket card__bracket--tl"></div>
    <div class="card__bracket card__bracket--tr"></div>
    <div class="card__bracket card__bracket--bl"></div>
    <div class="card__bracket card__bracket--br"></div>

    <div class="card__body">
      <!-- Manga Illustration -->
      <div class="illustration">
        <div class="illustration__wrapper">
          <span class="illustration__emote" aria-hidden="true">💥😱</span>
          <span class="illustration__spark illustration__spark--1" aria-hidden="true">⚡</span>
          <span class="illustration__spark illustration__spark--2" aria-hidden="true">💢</span>
          <span class="illustration__spark illustration__spark--3" aria-hidden="true">🔥</span>
        </div>
      </div>

      <!-- Error Code -->
      <div class="error-code">500</div>

      <!-- Title Section -->
      <div class="title-section">
        <span class="title-jp">サーバーエラー</span>
        <h1 class="title-main">Atrocity Mode Aktif!</h1>
        <div class="title-separator"></div>
      </div>

      <!-- Manga Speech Bubble -->
      <div class="speech-bubble">
        <span class="speech-bubble__avatar">🛡️🍁</span>
        <p class="speech-bubble__text">
          "Waduh! Kayaknya server-nya lagi kena <strong>debuff</strong> nih...
          Tenang aja, <strong>Absolute Defense</strong>-ku udah aktif!
          Tim <strong>Maple Tree</strong> lagi beresin, coba lagi nanti ya~ ✨"
        </p>
      </div>

      <!-- Action Buttons -->
      <div class="actions">
        <button class="btn btn--primary" id="retryBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Coba Lagi
        </button>
        <a href="/" class="btn btn--secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Kembali ke Beranda
        </a>
      </div>

      <!-- Status Row -->
      <div class="status-row">
        <div class="status-row__item">
          <span class="status-row__dot" aria-hidden="true"></span>
          <span class="status-row__label">STATUS</span>
          <span class="status-row__value" id="statusCode">500</span>
        </div>
        <div class="status-row__item">
          <span class="status-row__label">⏱️ TIMESTAMP</span>
          <span class="status-row__value" id="errorTimestamp">—</span>
        </div>
      </div>

      <!-- Footer Note -->
      <p class="footer-note">
        <span>hayaxxdev</span> · Error Code: 500 · Internal Server Error
      </p>
    </div>
  </main>

  <!-- Script: Retry & Status -->
  <script>
    (function() {
      // Update timestamp
      const tsEl = document.getElementById('errorTimestamp');
      if (tsEl) {
        const now = new Date();
        tsEl.textContent = now.toISOString().substring(0, 19).replace('T', ' ');
      }
      
      // Update status code from URL params
      const statusEl = document.getElementById('statusCode');
      if (statusEl) {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || '500';
        statusEl.textContent = code;
      }
      
      // Retry button with loading state
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) {
        retryBtn.addEventListener('click', function() {
          retryBtn.textContent = '⏳ Mencoba...';
          retryBtn.disabled = true;
          retryBtn.style.opacity = '0.7';
          retryBtn.style.cursor = 'wait';
          
          setTimeout(() => {
            window.location.reload();
          }, 800);
        });
      }
      
      // Handle bfcache
      window.addEventListener('pageshow', (event) => {
        if (event.persisted && tsEl) {
          const now = new Date();
          tsEl.textContent = now.toISOString().substring(0, 19).replace('T', ' ');
        }
      });
    })();
  </script>
</body>
</html>
