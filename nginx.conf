# ═══════════════════════════════════════════
# NGINX ERROR HANDLING
# ═══════════════════════════════════════════

server {
    listen 80;
    server_name hayaxxdev-bit.github.io hayaxxdev-bit.my.id;
    root /var/www/html/public;
    index index.html;

    # ═══════════════ ERROR PAGES ═══════════════
    error_page 400 /error.html?code=400;
    error_page 401 /error.html?code=401;
    error_page 403 /error.html?code=403;
    error_page 404 /404.html;
    error_page 405 /error.html?code=405;
    error_page 408 /error.html?code=408;
    error_page 500 502 503 504 /error.html?code=500;

    # Custom error page location
    location = /404.html {
        internal;
    }

    location = /error.html {
        internal;
    }

    # ═══════════════ SECURITY ═══════════════
    # Prevent access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Prevent access to sensitive files
    location ~* \.(env|git|htaccess|json|lock|md)$ {
        deny all;
        return 404;
    }

    # ═══════════════ GZIP ═══════════════
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ═══════════════ CACHE ═══════════════
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}